<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: transparent;
}

@keyframes item-enter {
  from { opacity: 0; transform: translateY(7px); }
  to   { opacity: 1; transform: translateY(0); }
}
body { padding: 0 1px 3px; }

/* ── Trigger ──────────────────────────────────────────────────── */
.trigger {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 10px 10px 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  cursor: pointer;
  text-align: left;
  outline: none;
  font-family: inherit;
  box-shadow: 0 1px 6px rgba(0, 0, 0, 0.25);
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.trigger:hover {
  border-color: rgba(99, 102, 241, 0.45);
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 2px 12px rgba(99, 102, 241, 0.2);
}
.trigger.open {
  border-color: rgba(99, 102, 241, 0.6);
  background: rgba(255, 255, 255, 0.07);
  box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2), 0 4px 20px rgba(99, 102, 241, 0.18);
}
.trigger:focus-visible { box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5); }

.t-icon {
  font-size: 15px; line-height: 1;
  flex-shrink: 0; width: 20px; text-align: center;
}
.t-body {
  flex: 1; min-width: 0;
  display: flex; align-items: baseline; gap: 6px; overflow: hidden;
}
.t-label {
  font-size: 12.5px; font-weight: 600;
  color: rgba(255, 255, 255, 0.88);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.t-tag {
  flex-shrink: 0;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: #a5b4fc;
  padding: 2px 5px; border-radius: 5px;
  background: rgba(99, 102, 241, 0.15);
  border: 1px solid rgba(99, 102, 241, 0.3);
}
.chevron {
  flex-shrink: 0; display: flex; align-items: center;
  color: rgba(255, 255, 255, 0.25);
  transition: transform 0.24s cubic-bezier(0.4, 0, 0.2, 1), color 0.15s;
}
.trigger:hover .chevron { color: rgba(255, 255, 255, 0.45); }
.trigger.open .chevron  { transform: rotate(180deg); color: #a5b4fc; }

/* ── Panel — max-height: 0 when closed so it takes NO layout space ─ */
.panel {
  overflow: hidden;
  max-height: 0;
  margin-top: 0;
  opacity: 0;
  pointer-events: none;
  transition: max-height 0.22s cubic-bezier(0.4, 0, 0.2, 1),
              margin-top  0.22s cubic-bezier(0.4, 0, 0.2, 1),
              opacity     0.16s ease;
}
.panel.open {
  max-height: 500px;
  margin-top: 5px;
  opacity: 1;
  pointer-events: auto;
}
/* GlassCard panel */
.panel-body {
  border-radius: 15px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(2, 6, 23, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  padding: 6px;
  overflow: hidden;
}

/* ── Items ────────────────────────────────────────────────────── */
.items { position: relative; }

/* Fluid sliding highlight */
.hl {
  position: absolute;
  left: 0; right: 0; top: 0;
  border-radius: 9px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.18);
  pointer-events: none;
  opacity: 0;
  transition: transform  0.22s cubic-bezier(0.34, 1.18, 0.64, 1),
              height     0.22s cubic-bezier(0.34, 1.18, 0.64, 1),
              opacity    0.12s ease;
  will-change: transform, height;
}

.item {
  position: relative;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: 9px;
  cursor: pointer;
  user-select: none; -webkit-user-select: none;
}
.item.sel::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 9px;
  background: rgba(99, 102, 241, 0.12);
  border: 1px solid rgba(99, 102, 241, 0.22);
  pointer-events: none;
}

.i-icon {
  position: relative; z-index: 1; flex-shrink: 0;
  width: 26px; height: 26px; border-radius: 7px;
  background: rgba(255, 255, 255, 0.05);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: background 0.12s, transform 0.16s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.item.sel     .i-icon { background: rgba(99, 102, 241, 0.22); }
.item.hov     .i-icon { transform: scale(1.1); background: rgba(255, 255, 255, 0.1); }
.item.sel.hov .i-icon { background: rgba(99, 102, 241, 0.3); }

.i-text { position: relative; z-index: 1; flex: 1; min-width: 0; }
.i-name {
  font-size: 12px; font-weight: 600;
  color: rgba(255, 255, 255, 0.48);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3; transition: color 0.12s;
}
.item.sel .i-name { color: rgba(255, 255, 255, 0.94); }
.item.hov .i-name { color: rgba(255, 255, 255, 0.78); }
.i-sub {
  font-size: 10px; color: rgba(255, 255, 255, 0.22);
  margin-top: 1px; line-height: 1.3; transition: color 0.12s;
}
.item.sel .i-sub { color: #a5b4fc; }
.item.hov .i-sub { color: rgba(255, 255, 255, 0.38); }

.i-check {
  position: relative; z-index: 1; flex-shrink: 0;
  width: 14px; height: 14px;
  color: #a5b4fc;
  display: none; align-items: center; justify-content: center;
}
.item.sel .i-check { display: flex; }
</style>
</head>
<body>
<div id="app">
  <button class="trigger" id="trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="Select practice mode">
    <span class="t-icon" id="t-icon">💡</span>
    <span class="t-body">
      <span class="t-label" id="t-label">Loading…</span>
      <span class="t-tag"   id="t-tag"></span>
    </span>
    <span class="chevron" aria-hidden="true">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </button>

  <div class="panel" id="panel">
    <div class="panel-body">
      <div class="items" id="items">
        <div class="hl" id="hl"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Streamlit bridge ──────────────────────────────────────────────────────────
// Streamlit 1.x requires isStreamlitMessage: true on every postMessage or it
// silently ignores the message (causing the "timeout error" on componentReady).
const ST = {
  value(v) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: v, dataType: "json" }, "*");
  },
  height(h) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: Math.ceil(Math.max(h, 44)) }, "*");
  },
  ready() {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
  }
};

// ── State ─────────────────────────────────────────────────────────────────────
let opts    = [];
let selVal  = null;
let isOpen  = false;
let hovIdx  = -1;
let focIdx  = -1;
let taBuf   = "";
let taTimer = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const trigger  = document.getElementById("trigger");
const tIcon    = document.getElementById("t-icon");
const tLabel   = document.getElementById("t-label");
const tTag     = document.getElementById("t-tag");
const panel    = document.getElementById("panel");
const items    = document.getElementById("items");
const hl       = document.getElementById("hl");

// ── Height helpers ────────────────────────────────────────────────────────────
// Use scrollHeight (not offsetHeight) to get true content size, ignoring max-height CSS.
function panelContentH() {
  // panel-body is the visual wrapper inside .panel
  return panel.querySelector(".panel-body").scrollHeight;
}

function syncHeight() {
  const h = isOpen
    ? trigger.offsetHeight + 5 + panelContentH() + 4
    : trigger.offsetHeight + 4;
  ST.height(h);
}

// ── Highlight animation ───────────────────────────────────────────────────────
function moveHl(idx, instant) {
  const els = Array.from(items.querySelectorAll(".item"));
  if (idx < 0 || idx >= els.length) { hl.style.opacity = "0"; return; }
  const ir = els[idx].getBoundingClientRect();
  const cr = items.getBoundingClientRect();
  const top = ir.top - cr.top;

  if (instant) {
    hl.style.transition = "none";
    requestAnimationFrame(() => requestAnimationFrame(() => { hl.style.transition = ""; }));
  }
  hl.style.height    = ir.height + "px";
  hl.style.transform = `translateY(${top}px)`;
  hl.style.opacity   = "1";
}

// ── Open / Close ──────────────────────────────────────────────────────────────
function open() {
  if (isOpen) return;
  isOpen = true;
  // Expand iframe BEFORE showing panel to avoid clipping
  syncHeight();
  requestAnimationFrame(() => {
    trigger.classList.add("open");
    trigger.setAttribute("aria-expanded", "true");
    panel.classList.add("open");
    // Staggered item entry — restart animation on each open
    Array.from(items.querySelectorAll(".item")).forEach((el, i) => {
      el.style.animation = "none";
      el.offsetHeight; // force reflow to restart animation
      el.style.animation = `item-enter 0.28s cubic-bezier(0.16, 1, 0.3, 1) ${i * 0.045}s both`;
    });
  });
  focIdx = Math.max(opts.findIndex(o => o.value === selVal), 0);
  hovIdx = -1;
  moveHl(focIdx, true);
}

function close(refocus = true) {
  if (!isOpen) return;
  isOpen = false;
  trigger.classList.remove("open");
  trigger.setAttribute("aria-expanded", "false");
  panel.classList.remove("open");
  hovIdx = -1; focIdx = -1;
  hl.style.opacity = "0";
  if (refocus) trigger.focus();
  // Shrink iframe after panel animation finishes (220ms)
  setTimeout(syncHeight, 240);
}

function toggle() { isOpen ? close() : open(); }

// ── Selection ─────────────────────────────────────────────────────────────────
function select(val) {
  selVal = val;
  refreshTrigger();
  refreshItems();
  ST.value(val);
  close(true);
}

// ── DOM updates ───────────────────────────────────────────────────────────────
function refreshTrigger() {
  const o = opts.find(o => o.value === selVal);
  if (!o) return;
  tIcon.textContent  = o.icon;
  tLabel.textContent = o.label;
  tTag.textContent   = o.tag || "";
  tTag.style.display = o.tag ? "" : "none";
}

function refreshItems() {
  Array.from(items.querySelectorAll(".item")).forEach((el, i) => {
    el.classList.toggle("sel", el.dataset.value === selVal);
    el.classList.toggle("hov", i === hovIdx);
    el.setAttribute("aria-selected", el.dataset.value === selVal ? "true" : "false");
  });
}

function buildItems() {
  Array.from(items.querySelectorAll(".item")).forEach(e => e.remove());
  opts.forEach((o, idx) => {
    const el = document.createElement("div");
    el.className    = "item";
    el.dataset.value = o.value;
    el.setAttribute("role", "option");
    el.setAttribute("aria-selected", o.value === selVal ? "true" : "false");
    el.innerHTML = `
      <div class="i-icon">${o.icon}</div>
      <div class="i-text">
        <div class="i-name">${o.label}</div>
        <div class="i-sub">${o.subtitle}</div>
      </div>
      <div class="i-check" aria-hidden="true">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6.5L4.5 9L10 3.5" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;

    el.addEventListener("mouseenter", () => { hovIdx = idx; refreshItems(); moveHl(idx); });
    el.addEventListener("click",      () => select(o.value));
    items.insertBefore(el, hl);
  });

  // When mouse leaves the panel → highlight returns to selected
  items.onmouseleave = () => {
    hovIdx = -1; refreshItems();
    const si = opts.findIndex(o => o.value === selVal);
    if (isOpen && si >= 0) moveHl(si);
    else hl.style.opacity = "0";
  };

  refreshItems();
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
trigger.addEventListener("keydown", e => {
  if      (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); }
  else if (e.key === "ArrowDown")              { e.preventDefault(); open();   }
  else if (e.key === "ArrowUp")                { e.preventDefault(); open();   }
  else if (e.key === "Escape")                 { close(); }
});

document.addEventListener("keydown", e => {
  if (!isOpen) return;
  const n = opts.length;
  if      (e.key === "ArrowDown") { e.preventDefault(); focIdx = (focIdx+1)%n;      hovIdx=-1; moveHl(focIdx); refreshItems(); }
  else if (e.key === "ArrowUp")   { e.preventDefault(); focIdx = (focIdx-1+n)%n;   hovIdx=-1; moveHl(focIdx); refreshItems(); }
  else if (e.key === "Enter")     { e.preventDefault(); if (focIdx>=0) select(opts[focIdx].value); }
  else if (e.key === "Escape")    { e.preventDefault(); close(); }
  else if (e.key === "Home")      { e.preventDefault(); focIdx=0;    hovIdx=-1; moveHl(0);    refreshItems(); }
  else if (e.key === "End")       { e.preventDefault(); focIdx=n-1;  hovIdx=-1; moveHl(n-1); refreshItems(); }
  else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    taBuf += e.key.toLowerCase();
    const i = opts.findIndex(o => o.label.toLowerCase().startsWith(taBuf));
    if (i >= 0) { focIdx = i; hovIdx = -1; moveHl(i); refreshItems(); }
    clearTimeout(taTimer);
    taTimer = setTimeout(() => { taBuf = ""; }, 700);
  }
});

trigger.addEventListener("click", toggle);

// Close when iframe loses focus (user clicked elsewhere in the Streamlit page)
window.addEventListener("blur", () => { if (isOpen) setTimeout(() => close(false), 160); });

// ── Streamlit render ──────────────────────────────────────────────────────────
window.addEventListener("message", ({ data }) => {
  if (data.type !== "streamlit:render") return;
  const { options: newOpts, value: newVal } = data.args;
  opts   = newOpts || [];
  selVal = newVal  || (opts[0] ? opts[0].value : null);
  buildItems();
  refreshTrigger();
  syncHeight();
});

// ── Boot ─────────────────────────────────────────────────────────────────────
// Script is at end of <body> so DOM is already ready — no DOMContentLoaded needed.
ST.height(46);
ST.ready();
window.addEventListener("resize", syncHeight);
</script>
</body>
</html>
